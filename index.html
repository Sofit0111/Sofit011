<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sofit0111 portfolio: React, TypeScript, React Native, Modern CSS and Python.">
  <meta property="og:title" content="Sofit0111 - Portfolio">
  <meta property="og:description" content="Frontend, mobile and Python portfolio with interactive UI.">
  <title>Sofit0111 - Portfolio</title>
  <style>
    :root {
      --bg: #080a0f;
      --panel: rgba(16, 20, 30, 0.78);
      --panel-strong: rgba(24, 30, 44, 0.94);
      --text: #f4f7fb;
      --muted: #a9b2c3;
      --line: rgba(255, 255, 255, 0.12);
      --cyan: #62e8ff;
      --lime: #b8ff6a;
      --coral: #ff7b72;
      --violet: #b69cff;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
    }

    body.light {
      --bg: #eef4f7;
      --panel: rgba(255, 255, 255, 0.74);
      --panel-strong: rgba(255, 255, 255, 0.94);
      --text: #111827;
      --muted: #516070;
      --line: rgba(17, 24, 39, 0.13);
      --shadow: 0 24px 70px rgba(39, 57, 82, 0.18);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 78% 18%, rgba(98, 232, 255, 0.17), transparent 28rem),
        radial-gradient(circle at 12% 78%, rgba(184, 255, 106, 0.11), transparent 26rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
      transition: background 260ms ease, color 260ms ease;
    }

    body.menu-open { overflow: hidden; }
    a { color: inherit; text-decoration: none; }
    button, input, textarea { font: inherit; }

    .site-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      opacity: 0.78;
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(to bottom, black, transparent 92%);
    }

    .container {
      width: min(1160px, calc(100% - 40px));
      margin: 0 auto;
    }

    .site-header {
      position: fixed;
      top: 14px;
      left: 50%;
      z-index: 20;
      width: min(1160px, calc(100% - 28px));
      transform: translateX(-50%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(8, 10, 15, 0.72);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(18px);
    }

    body.light .site-header { background: rgba(246, 250, 252, 0.76); }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      gap: 12px;
      padding: 0 16px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: max-content;
      font-weight: 800;
    }

    .logo-mark {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border: 1px solid rgba(98, 232, 255, 0.6);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(98, 232, 255, 0.28), rgba(184, 255, 106, 0.15));
      color: var(--cyan);
      box-shadow: 0 0 28px rgba(98, 232, 255, 0.25);
    }

    .nav-links, .nav-tools {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-links a,
    .lang-btn,
    .theme-toggle {
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 10px 12px;
      font-size: 0.92rem;
      transition: color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .nav-links a:hover,
    .nav-links a.active,
    .lang-btn:hover,
    .lang-btn.active,
    .theme-toggle:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
    }

    body.light .nav-links a:hover,
    body.light .nav-links a.active,
    body.light .lang-btn:hover,
    body.light .lang-btn.active,
    body.light .theme-toggle:hover {
      background: rgba(17, 24, 39, 0.06);
    }

    .lang-switcher {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 3px;
      background: rgba(255, 255, 255, 0.05);
    }

    .lang-btn {
      min-width: 42px;
      padding: 7px 9px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .theme-toggle {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      padding: 0;
    }

    .menu-toggle {
      display: none;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      cursor: pointer;
    }

    .hero {
      min-height: 100svh;
      display: grid;
      align-items: center;
      padding: 118px 0 58px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.06fr) minmax(320px, 0.94fr);
      gap: 44px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 18px;
      color: var(--cyan);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 0 0 rgba(184, 255, 106, 0.62);
      animation: pulse 1.8s infinite;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      max-width: 850px;
      margin-bottom: 22px;
      font-size: clamp(3.4rem, 9vw, 7.8rem);
      line-height: 0.9;
    }

    .hero-name {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, #ffffff, var(--cyan) 38%, var(--lime) 74%, #ffffff);
      background-clip: text;
      -webkit-background-clip: text;
      filter: drop-shadow(0 14px 42px rgba(98, 232, 255, 0.22));
    }

    body.light .hero-name {
      background: linear-gradient(90deg, #111827, #0088a8 38%, #3a7a08 74%, #111827);
      background-clip: text;
      -webkit-background-clip: text;
    }

    .hero-copy {
      max-width: 650px;
      margin-bottom: 28px;
      color: var(--muted);
      font-size: clamp(1.04rem, 2vw, 1.25rem);
    }

    .hero-actions,
    .slider-actions,
    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: rgba(98, 232, 255, 0.52);
      background: rgba(98, 232, 255, 0.09);
      box-shadow: 0 14px 34px rgba(98, 232, 255, 0.16);
    }

    .btn.primary {
      border-color: rgba(98, 232, 255, 0.45);
      background: linear-gradient(135deg, rgba(98, 232, 255, 0.28), rgba(184, 255, 106, 0.16));
    }

    .hero-panel {
      position: relative;
      min-height: 560px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(150deg, rgba(16, 20, 30, 0.78), rgba(16, 20, 30, 0.38));
      box-shadow: var(--shadow);
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 160ms ease;
    }

    body.light .hero-panel {
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.38));
    }

    .hero-panel::before {
      content: "";
      position: absolute;
      inset: -30%;
      background: conic-gradient(from 170deg, transparent, rgba(98, 232, 255, 0.28), transparent 34%, rgba(184, 255, 106, 0.16), transparent 58%);
      animation: rotate 12s linear infinite;
      opacity: 0.7;
    }

    .interface-card,
    .about-panel,
    .skill-tile,
    .stack-card,
    .tracker-section-card,
    .project-slide,
    .contact-shell {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 20px 56px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(16px);
    }

    .interface-card {
      position: absolute;
      background: rgba(8, 10, 15, 0.76);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.38);
    }

    body.light .interface-card { background: rgba(255, 255, 255, 0.76); }

    .profile-card {
      top: 28px;
      left: 28px;
      right: 28px;
      padding: 24px;
      transform: translateZ(36px);
    }

    .profile-top {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }

    .avatar {
      display: grid;
      width: 72px;
      height: 72px;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(98, 232, 255, 0.32), rgba(255, 123, 114, 0.18));
      color: #ffffff;
      font-size: 1.6rem;
      font-weight: 900;
    }

    .profile-card h2 { margin-bottom: 4px; font-size: 1.42rem; }
    .profile-card p, .floating-card p, .tracker-card p { margin-bottom: 0; color: var(--muted); }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat {
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    body.light .stat { background: rgba(17, 24, 39, 0.04); }
    .stat strong { display: block; font-size: 1.5rem; }
    .stat span { color: var(--muted); font-size: 0.82rem; }

    .tracker-card {
      left: 28px;
      right: 28px;
      bottom: 150px;
      padding: 18px;
      transform: translateZ(28px);
    }

    .tracker-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 12px 0 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .progress-bar {
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .progress-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--lime));
      box-shadow: 0 0 22px rgba(98, 232, 255, 0.35);
      transition: width 900ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .floating-card {
      right: 28px;
      bottom: 30px;
      width: min(72%, 310px);
      padding: 18px;
      animation: float 5s ease-in-out infinite;
    }

    .sparkline {
      width: 100%;
      height: 74px;
      margin-top: 14px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(98, 232, 255, 0.24), transparent),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 24px);
      clip-path: polygon(0 72%, 12% 48%, 26% 58%, 39% 28%, 54% 42%, 68% 18%, 82% 34%, 100% 10%, 100% 100%, 0 100%);
    }

    section {
      padding: 98px 0;
      scroll-margin-top: 94px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 28px;
      margin-bottom: 34px;
    }

    .section-head h2 {
      margin-bottom: 0;
      font-size: clamp(2.1rem, 4vw, 4rem);
      line-height: 1;
    }

    .section-head p {
      max-width: 520px;
      margin-bottom: 0;
      color: var(--muted);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: 18px;
    }

    .about-panel,
    .tracker-section-card {
      padding: 28px;
    }

    .about-panel p {
      color: var(--muted);
      font-size: 1.05rem;
    }

    .stack-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .stack-card {
      position: relative;
      padding: 20px;
      overflow: hidden;
      transition: transform 220ms ease, border-color 220ms ease, background 220ms ease;
    }

    .stack-card:hover {
      transform: translateY(-6px);
      border-color: rgba(184, 255, 106, 0.38);
      background: var(--panel-strong);
    }

    .stack-icon,
    .skill-icon {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      margin-bottom: 14px;
      border-radius: 8px;
      background: rgba(98, 232, 255, 0.12);
      color: var(--cyan);
      font-weight: 900;
    }

    .stack-card h3,
    .skill-tile h3 { margin-bottom: 10px; }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      font-size: 0.84rem;
    }

    body.light .tag { background: rgba(17, 24, 39, 0.045); }

    .skill-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .skill-tile {
      position: relative;
      min-height: 164px;
      padding: 22px;
      overflow: hidden;
      transition: transform 220ms ease, border-color 220ms ease, background 220ms ease;
    }

    .skill-tile::after {
      content: "";
      position: absolute;
      right: -44px;
      bottom: -44px;
      width: 130px;
      height: 130px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
    }

    .skill-tile:hover {
      transform: translateY(-6px);
      border-color: rgba(98, 232, 255, 0.42);
      background: var(--panel-strong);
    }

    .skill-tile p,
    .stack-card p,
    .tracker-section-card p,
    .project-info p,
    .contact-aside p {
      color: var(--muted);
    }

    .tracker-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 18px;
      align-items: center;
    }

    .tracker-ring {
      --value: 68;
      display: grid;
      width: 180px;
      height: 180px;
      place-items: center;
      justify-self: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, var(--bg) 55%, transparent 56%),
        conic-gradient(var(--cyan) calc(var(--value) * 1%), rgba(255, 255, 255, 0.12) 0);
      box-shadow: inset 0 0 24px rgba(98, 232, 255, 0.16), 0 18px 46px rgba(0, 0, 0, 0.24);
      transition: background 600ms ease;
    }

    .tracker-ring strong {
      font-size: 2.4rem;
      line-height: 1;
    }

    .tracker-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .projects-stage { position: relative; overflow: hidden; }

    .project-track {
      display: flex;
      transition: transform 560ms cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    .project-slide {
      flex: 0 0 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 0.8fr);
      min-height: 460px;
      overflow: hidden;
    }

    .project-visual {
      position: relative;
      min-height: 430px;
      overflow: hidden;
      background: #111722;
    }

    .project-visual::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(98, 232, 255, 0.28), transparent 42%),
        radial-gradient(circle at 74% 28%, rgba(184, 255, 106, 0.34), transparent 14rem),
        radial-gradient(circle at 30% 72%, rgba(255, 123, 114, 0.22), transparent 12rem);
      transition: transform 500ms ease, filter 500ms ease;
    }

    .project-visual::after {
      content: "";
      position: absolute;
      inset: 36px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 34px 34px;
      transform: perspective(600px) rotateX(58deg) rotateZ(-12deg) translateY(26px);
      transform-origin: center;
      transition: transform 500ms ease;
    }

    .project-slide:hover .project-visual::before {
      transform: scale(1.08);
      filter: saturate(1.35);
    }

    .project-slide:hover .project-visual::after {
      transform: perspective(600px) rotateX(58deg) rotateZ(-12deg) translateY(10px);
    }

    .project-chip {
      position: absolute;
      left: 34px;
      bottom: 34px;
      z-index: 2;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(8, 10, 15, 0.72);
      color: #fff;
      backdrop-filter: blur(14px);
    }

    .project-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 34px;
    }

    .project-info h3 {
      margin-bottom: 12px;
      font-size: clamp(1.7rem, 3vw, 2.8rem);
      line-height: 1;
    }

    .icon-btn {
      display: inline-grid;
      width: 46px;
      height: 46px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .icon-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(98, 232, 255, 0.5);
      background: rgba(98, 232, 255, 0.09);
    }

    .slider-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 16px;
    }

    .dots { display: flex; gap: 8px; }

    .dot {
      width: 28px;
      height: 8px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      cursor: pointer;
      transition: width 220ms ease, background 220ms ease;
    }

    .dot.active {
      width: 52px;
      background: var(--cyan);
    }

    .contact-shell {
      display: grid;
      grid-template-columns: 0.86fr 1.14fr;
      gap: 0;
      overflow: hidden;
    }

    .contact-aside {
      padding: 34px;
      background: linear-gradient(135deg, rgba(98, 232, 255, 0.18), rgba(184, 255, 106, 0.08));
    }

    .contact-links {
      display: grid;
      gap: 10px;
      margin-top: 28px;
    }

    .contact-links a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      transition: transform 180ms ease, background 180ms ease;
    }

    .contact-links a:hover {
      transform: translateX(4px);
      background: rgba(255, 255, 255, 0.09);
    }

    form {
      display: grid;
      gap: 14px;
      padding: 34px;
    }

    .field { display: grid; gap: 8px; }
    .field span { color: var(--muted); font-size: 0.92rem; }

    input, textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
      outline: 0;
      padding: 14px 15px;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    body.light input,
    body.light textarea {
      background: rgba(17, 24, 39, 0.04);
    }

    textarea { min-height: 136px; resize: vertical; }

    input:focus,
    textarea:focus {
      border-color: rgba(98, 232, 255, 0.56);
      background: rgba(255, 255, 255, 0.075);
      box-shadow: 0 0 0 4px rgba(98, 232, 255, 0.11);
    }

    .field.error input,
    .field.error textarea {
      border-color: rgba(255, 123, 114, 0.72);
      box-shadow: 0 0 0 4px rgba(255, 123, 114, 0.12);
    }

    .field-error {
      min-height: 18px;
      color: var(--coral);
      font-size: 0.82rem;
    }

    .form-note {
      min-height: 22px;
      margin: 0;
      color: var(--lime);
    }

    .site-footer {
      border-top: 1px solid var(--line);
      padding: 28px 0 38px;
      background: rgba(8, 10, 15, 0.48);
    }

    body.light .site-footer { background: rgba(246, 250, 252, 0.54); }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .socials a {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      transition: color 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .socials a:hover {
      color: var(--text);
      border-color: rgba(184, 255, 106, 0.46);
      transform: translateY(-2px);
    }

    .reveal {
      opacity: 0;
      transform: translateY(26px);
      transition: opacity 700ms ease, transform 700ms ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .spotlight {
      position: relative;
      overflow: hidden;
    }

    .spotlight::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(98, 232, 255, 0.14), transparent 18rem);
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    .spotlight:hover::before { opacity: 1; }

    @keyframes pulse {
      70% { box-shadow: 0 0 0 14px rgba(184, 255, 106, 0); }
      100% { box-shadow: 0 0 0 0 rgba(184, 255, 106, 0); }
    }

    @keyframes rotate { to { transform: rotate(360deg); } }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

      theme: localStorage.getItem("sofit-theme") || "dark",
      tracker: Number(localStorage.getItem("sofit-tracker") || 68),
      slide: 0
    };

    const getText = (path) => path.split(".").reduce((value, key) => value?.[key], translations[state.lang]) || "";

    function renderStaticText() {
      document.documentElement.lang = state.lang;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = getText(node.dataset.i18n);
      });
      document.querySelectorAll("[data-placeholder]").forEach((node) => {
        node.placeholder = getText(node.dataset.placeholder);
      });
      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === state.lang);
      });
    }

    function renderSkills() {
      document.querySelector("[data-skill-grid]").innerHTML = translations[state.lang].skills.map(([icon, title, text]) => `
        <article class="skill-tile reveal visible spotlight">
          <span class="skill-icon">${icon}</span>
          <h3>${title}</h3>
          <p>${text}</p>
        </article>
      `).join("");
    }

    function renderStack() {
      document.querySelector("[data-stack-grid]").innerHTML = translations[state.lang].stack.cards.map(([icon, title, text, tags]) => `
        <article class="stack-card spotlight">
          <span class="stack-icon">${icon}</span>
          <h3>${title}</h3>
          <p>${text}</p>
          <div class="tag-row">${tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
        </article>
      `).join("");
    }

    function renderProjects() {
      const ctas = [translations[state.lang].projects.cta1, translations[state.lang].projects.cta2, translations[state.lang].projects.cta3];
      document.querySelector("[data-project-track]").innerHTML = translations[state.lang].projects.items.map(([chip, title, text, tags], index) => `
        <article class="project-slide">
          <div class="project-visual"><span class="project-chip">${chip}</span></div>
          <div class="project-info">
            <h3>${title}</h3>
            <p>${text}</p>
            <div class="tag-row">${tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
            <a class="btn primary" href="#contact">${ctas[index]}</a>
          </div>
        </article>
      `).join("");
      buildDots();
      setSlide(state.slide, false);
    }

    function setLanguage(lang) {
      state.lang = lang;
      localStorage.setItem("sofit-lang", lang);
      renderStaticText();
      renderSkills();
      renderStack();
      renderProjects();
      clearFormErrors();
    }

    function setTheme(theme) {
      state.theme = theme;
      localStorage.setItem("sofit-theme", theme);
      document.body.classList.toggle("light", theme === "light");
      document.querySelector("[data-theme-toggle]").textContent = theme === "light" ? "◑" : "◐";
    }

    const canvas = document.querySelector(".site-canvas");
    const ctx = canvas.getContext("2d");
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    let width = 0;
    let height = 0;
    let particles = [];
    let mouse = { x: 0.5, y: 0.5 };
    let burst = { x: 0, y: 0, force: 0, hue: 0 };

    function resizeCanvas() {
      const ratio = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * ratio;
      canvas.height = height * ratio;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      const count = Math.min(82, Math.max(36, Math.floor(width / 18)));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.38,
        vy: (Math.random() - 0.5) * 0.38,
        r: Math.random() * 2 + 0.8
      }));
    }

    function drawCanvas() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = state.theme === "light" ? "rgba(238, 244, 247, 0.24)" : "rgba(8, 10, 15, 0.26)";
      ctx.fillRect(0, 0, width, height);

      particles.forEach((p, index) => {
        if (!prefersReducedMotion) {
          if (burst.force > 0) {
            const dx = p.x - burst.x;
            const dy = p.y - burst.y;
            const distance = Math.max(Math.hypot(dx, dy), 1);
            if (distance < 190) {
              const push = (1 - distance / 190) * burst.force;
              p.vx += (dx / distance) * push;
              p.vy += (dy / distance) * push;
            }
          }
          p.vx *= 0.985;
          p.vy *= 0.985;
          p.x += p.vx + (mouse.x - 0.5) * 0.18;
          p.y += p.vy + (mouse.y - 0.5) * 0.18;
        }

        if (p.x < -20) p.x = width + 20;
        if (p.x > width + 20) p.x = -20;
        if (p.y < -20) p.y = height + 20;
        if (p.y > height + 20) p.y = -20;

        for (let j = index + 1; j < particles.length; j++) {
          const other = particles[j];
          const dx = p.x - other.x;
          const dy = p.y - other.y;
          const distance = Math.hypot(dx, dy);
          if (distance < 130) {
            ctx.strokeStyle = `rgba(98, 232, 255, ${0.16 * (1 - distance / 130)})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(other.x, other.y);
            ctx.stroke();
          }
        }

        const burstColor = burst.force > 0.2;
        ctx.fillStyle = burstColor
          ? `hsla(${burst.hue + index * 3}, 95%, 68%, 0.84)`
          : (index % 5 === 0 ? "rgba(184, 255, 106, 0.8)" : "rgba(98, 232, 255, 0.72)");
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      });

      burst.force *= 0.9;
      requestAnimationFrame(drawCanvas);
    }

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("pointermove", (event) => {
      mouse = { x: event.clientX / width, y: event.clientY / height };
    });
    window.addEventListener("pointerdown", (event) => {
      burst = { x: event.clientX, y: event.clientY, force: 3.2, hue: Math.floor(Math.random() * 90) + 165 };
    });

    const menuToggle = document.querySelector(".menu-toggle");
    const navLinks = document.querySelectorAll(".nav-links a");
    menuToggle.addEventListener("click", () => {
      const isOpen = document.body.classList.toggle("menu-open");
      menuToggle.setAttribute("aria-expanded", String(isOpen));
    });
    navLinks.forEach((link) => {
      link.addEventListener("click", () => {
        document.body.classList.remove("menu-open");
        menuToggle.setAttribute("aria-expanded", "false");
      });
    });

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
    });
    document.querySelector("[data-theme-toggle]").addEventListener("click", () => {
      setTheme(state.theme === "light" ? "dark" : "light");
    });

    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.16 });

    function initReveals() {
      document.querySelectorAll(".reveal:not(.visible)").forEach((item) => revealObserver.observe(item));
    }

    const sections = document.querySelectorAll("main section[id]");
    const navObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        navLinks.forEach((link) => {
          link.classList.toggle("active", link.getAttribute("href") === `#${entry.target.id}`);
        });
      });
    }, { rootMargin: "-42% 0px -52% 0px" });
    sections.forEach((section) => navObserver.observe(section));

    document.addEventListener("pointermove", (event) => {
      document.querySelectorAll(".spotlight:hover").forEach((node) => {
        const rect = node.getBoundingClientRect();
        node.style.setProperty("--mx", `${event.clientX - rect.left}px`);
        node.style.setProperty("--my", `${event.clientY - rect.top}px`);
      });
    });

    const tiltPanel = document.querySelector("[data-tilt]");
    tiltPanel.addEventListener("pointermove", (event) => {
      const rect = tiltPanel.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width - 0.5;
      const y = (event.clientY - rect.top) / rect.height - 0.5;
      tiltPanel.style.transform = `rotateX(${y * -8}deg) rotateY(${x * 10}deg)`;
    });
    tiltPanel.addEventListener("pointerleave", () => {
      tiltPanel.style.transform = "rotateX(0deg) rotateY(0deg)";
    });

    const track = document.querySelector("[data-project-track]");
    const dotsWrap = document.querySelector(".dots");
    const prevBtn = document.querySelector("[data-prev]");
    const nextBtn = document.querySelector("[data-next]");
    let autoSlide;

    function buildDots() {
      dotsWrap.innerHTML = "";
      translations[state.lang].projects.items.forEach((_, index) => {
        const dot = document.createElement("button");
        dot.className = "dot";
        dot.type = "button";
        dot.setAttribute("aria-label", `Open project ${index + 1}`);
        dot.addEventListener("click", () => setSlide(index));
        dotsWrap.appendChild(dot);
      });
    }

    function setSlide(index, restart = true) {
      const total = translations[state.lang].projects.items.length;
      state.slide = (index + total) % total;
      track.style.transform = `translateX(${-state.slide * 100}%)`;
      document.querySelectorAll(".dot").forEach((dot, dotIndex) => dot.classList.toggle("active", dotIndex === state.slide));
      if (restart) restartAutoSlide();
    }

    function restartAutoSlide() {
      clearInterval(autoSlide);
      if (!prefersReducedMotion) {
        autoSlide = setInterval(() => setSlide(state.slide + 1, false), 6200);
      }
    }

    prevBtn.addEventListener("click", () => setSlide(state.slide - 1));
    nextBtn.addEventListener("click", () => setSlide(state.slide + 1));

    function renderTracker() {
      const value = Math.max(0, Math.min(100, state.tracker));
      state.tracker = value;
      localStorage.setItem("sofit-tracker", String(value));
      document.querySelectorAll("[data-tracker-value]").forEach((node) => { node.textContent = value; });
      document.querySelectorAll("[data-progress-fill]").forEach((node) => { node.style.width = `${value}%`; });
      document.querySelector("[data-tracker-ring]").style.setProperty("--value", value);
    }

    document.querySelector("[data-tracker-minus]").addEventListener("click", () => {
      state.tracker -= 5;
      renderTracker();
    });
    document.querySelector("[data-tracker-plus]").addEventListener("click", () => {
      state.tracker += 5;
      renderTracker();
    });

    const form = document.querySelector("#contactForm");
    const note = document.querySelector(".form-note");

    function setFieldError(fieldName, message) {
      const field = form.querySelector(`[data-field="${fieldName}"]`);
      field.classList.toggle("error", Boolean(message));
      field.querySelector(".field-error").textContent = message || "";
    }

    function clearFormErrors() {
      ["name", "email", "message"].forEach((field) => setFieldError(field, ""));
      note.textContent = "";
    }

    function validateForm() {
      const data = new FormData(form);
      const name = String(data.get("name") || "").trim();
      const email = String(data.get("email") || "").trim();
      const message = String(data.get("message") || "").trim();
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
      let valid = true;

      setFieldError("name", "");
      setFieldError("email", "");
      setFieldError("message", "");

      if (!name) {
        setFieldError("name", getText("form.required"));
        valid = false;
      }
      if (!email) {
        setFieldError("email", getText("form.required"));
        valid = false;
      } else if (!emailPattern.test(email)) {
        setFieldError("email", getText("form.email"));
        valid = false;
      }
      if (!message) {
        setFieldError("message", getText("form.required"));
        valid = false;
      } else if (message.length < 12) {
        setFieldError("message", getText("form.short"));
        valid = false;
      }
      return { valid, name };
    }

    form.addEventListener("input", () => {
      note.textContent = "";
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const result = validateForm();
      if (!result.valid) return;
      note.textContent = `${result.name}, ${getText("form.success")}`;
      form.reset();
    });

    setTheme(state.theme);
    setLanguage(state.lang);
    renderTracker();
    initReveals();
    resizeCanvas();
    drawCanvas();
    restartAutoSlide();
  </script>
</body>
</html>
